<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Registration</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="page-container">
        <div class="form-card">
            <h1 class="form-title">Create an Account</h1>
            
            <form id="registerForm" class="register-form" novalidate>
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="e.g. JohnDoe" autocomplete="username">
                    <small class="error-text" id="usernameError"></small>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="e.g. john@example.com" autocomplete="email">
                    <small class="error-text" id="emailError"></small>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Minimum 6 characters" autocomplete="new-password">
                    <small class="error-text" id="passwordError"></small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your password" autocomplete="new-password">
                    <small class="error-text" id="confirmPasswordError"></small>
                </div>

                <button type="submit" class="submit-btn">Register</button>
            </form>

            <div id="successMessage" class="success-message hidden">
                <h2>Registration Successful!</h2>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
